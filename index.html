<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QUEZELCO I QR Attendance</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
}

header{
    background:#006633;
    color:white;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

#reader{
    width:350px;
    margin:25px auto;
}

#result{

    margin:20px;

    font-size:22px;

    color:#006633;

    font-weight:bold;

}

</style>

</head>

<body>

<header>

QUEZELCO I

<br>

QR ATTENDANCE SYSTEM

</header>

<div id="reader"></div>

<div id="result">

Waiting for Scan...

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzGiWWVs-8QaReHRJeDg_830KAguWHC-oXMYiKTsCKP7kPoY2ZZSae5IsXXhVZrYSVqWg/exec";

let scanner=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cameras => {

    if (!cameras.length) {
        document.getElementById("result").innerHTML = "❌ No camera found.";
        return;
    }

    // Hanapin ang rear/back camera
    let rearCamera = cameras.find(camera =>
        camera.label.toLowerCase().includes("back") ||
        camera.label.toLowerCase().includes("rear") ||
        camera.label.toLowerCase().includes("environment")
    );

    // Kung walang label na "back", gamitin ang huling camera
    if (!rearCamera) {
        rearCamera = cameras[cameras.length - 1];
    }

    scanner.start(
        rearCamera.id,
        {
            fps: 15,
            qrbox: {
                width: 280,
                height: 280
            }
        },
        success
    );

}).catch(err => {

    console.error(err);

    document.getElementById("result").innerHTML =
        "❌ Camera Error: " + err;

});

function success(decodedText){

    document.getElementById("result").innerHTML="Checking...";

    fetch(API,{

        method:"POST",

        body:JSON.stringify({

            qr:decodedText

        })

    })

    .then(r=>r.json())

    .then(data=>{

        if(data.success){

            document.getElementById("result").innerHTML=

            "✅ "+data.action+

            "<br><br>"+

            data.name+

            "<br>"+

            data.time;

        }else{

            document.getElementById("result").innerHTML=

            "❌ "+data.message;

        }

    });

}

</script>

</body>
</html>
